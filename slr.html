<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skilled Language Reference — The DOR Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a1e28;--surface:#222733;--surface2:#262d3a;--border:#333a48;
  --blue:#5a9de6;--green:#3ecf7a;--amber:#f0a830;--red:#ef4444;
  --text:#f0f2f5;--muted:#9ca3b4;
  --logo-gradient:linear-gradient(135deg,#4a90d9,#3ecf7a);--logo-text:#0c0f14;
}
body{min-height:100vh;background:var(--bg);font-family:"Mulish",sans-serif;color:var(--text);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* Header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
.cp-logo{width:36px;height:36px;background:var(--logo-gradient);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--logo-text);flex-shrink:0;letter-spacing:-0.5px;}
.hdr-eyebrow{font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue);margin-bottom:2px;}
.hdr-title{font-size:17px;font-weight:800;line-height:1;}
.hdr-title span{color:var(--blue);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hdr-badge{background:rgba(90,157,230,0.1);border:1px solid rgba(90,157,230,0.2);color:var(--blue);font-size:9px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border-radius:4px;white-space:nowrap;}
.fav-toggle{background:rgba(240,168,48,0.08);border:1px solid rgba(240,168,48,0.2);color:var(--amber);font-family:"Mulish",sans-serif;font-size:9px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:4px;white-space:nowrap;cursor:pointer;transition:all 0.2s;}
.fav-toggle:hover,.fav-toggle.active{background:rgba(240,168,48,0.15);border-color:var(--amber);}

/* Search */
.search-wrap{padding:12px 24px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:69px;z-index:99;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;transition:border-color 0.2s;}
.search-box:focus-within{border-color:var(--blue);}
.search-icon{width:15px;height:15px;color:var(--muted);flex-shrink:0;}
.search-input{background:none;border:none;outline:none;color:var(--text);font-family:"Mulish",sans-serif;font-size:13px;font-weight:600;width:100%;}
.search-input::placeholder{color:var(--muted);}
.search-count{font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;}
.search-clear{background:none;border:none;cursor:pointer;color:var(--muted);padding:0;display:none;font-size:18px;line-height:1;flex-shrink:0;transition:color 0.15s;margin-top:-1px;}
.search-clear:hover{color:var(--text);}
.search-clear.visible{display:block;}

/* Filters */
.filter-panel{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:117px;z-index:98;}
.disc-bar{padding:10px 24px 6px;display:flex;gap:6px;}
.disc-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:"Mulish",sans-serif;font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:5px 14px;border-radius:4px;cursor:pointer;transition:all 0.2s;}
.disc-btn:hover{border-color:var(--green);color:var(--text);}
.disc-btn.active{background:rgba(62,207,122,0.1);border-color:var(--green);color:var(--green);}
.cat-bar{padding:4px 24px 10px;display:flex;flex-wrap:wrap;gap:6px;}
.cat-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:"Mulish",sans-serif;font-size:10px;font-weight:700;letter-spacing:0.05em;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.cat-btn:hover{border-color:var(--blue);color:var(--text);}
.cat-btn.active{background:rgba(90,157,230,0.1);border-color:var(--blue);color:var(--blue);}

/* Content */
.content{padding:20px 24px 80px;}
.cat-section{margin-bottom:32px;}
.cat-header{font-size:13px;font-weight:800;color:var(--blue);padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:0.06em;}
.cat-count{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.04em;text-transform:none;}
.sub-header{font-size:10px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:0.08em;padding:8px 0 6px;}

/* Phrase cards */
.phrase-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:11px 14px;margin-bottom:6px;cursor:pointer;transition:all 0.15s;}
.phrase-card:hover{border-color:var(--blue);background:var(--surface2);}
.phrase-card.copied{border-color:var(--green);}
.phrase-card.favorited{border-color:rgba(240,168,48,0.35);}
.phrase-card.favorited:hover{border-color:var(--amber);}
.phrase-top{display:flex;align-items:flex-start;gap:10px;}
.phrase-text{font-size:12.5px;font-weight:600;line-height:1.75;color:var(--text);flex:1;}
.fav-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 0 0;flex-shrink:0;opacity:0.25;transition:opacity 0.2s,transform 0.15s;line-height:1;}
.phrase-card:hover .fav-btn{opacity:0.6;}
.fav-btn.active{opacity:1;}
.fav-btn:hover{transform:scale(1.2);}
.phrase-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.phrase-tags{display:flex;gap:4px;flex-wrap:wrap;}
.copy-hint{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;opacity:0;transition:opacity 0.15s;white-space:nowrap;}
.phrase-card:hover .copy-hint{opacity:1;}

/* Tags */
.tag{font-size:9px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:rgba(90,157,230,0.08);color:var(--blue);border:1px solid rgba(90,157,230,0.15);}
.tag.t-green{background:rgba(62,207,122,0.08);color:var(--green);border-color:rgba(62,207,122,0.15);}
.tag.t-amber{background:rgba(240,168,48,0.08);color:var(--amber);border-color:rgba(240,168,48,0.15);}
.tag.t-red{background:rgba(239,68,68,0.08);color:var(--red);border-color:rgba(239,68,68,0.15);}

/* Avoid cards */
.avoid-card{background:var(--surface);border:1px solid rgba(239,68,68,0.2);border-left:3px solid var(--red);border-radius:6px;padding:11px 14px;margin-bottom:6px;}
.avoid-bad{font-size:12.5px;font-weight:700;color:var(--red);text-decoration:line-through;margin-bottom:4px;}
.avoid-why{font-size:12px;font-weight:600;color:var(--muted);line-height:1.65;}
.avoid-fix{font-size:12.5px;font-weight:600;color:var(--green);margin-top:6px;line-height:1.65;}

/* Favorites empty */
.fav-empty{text-align:center;padding:60px 20px;}
.fav-empty-icon{font-size:36px;margin-bottom:14px;}
.fav-empty-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:6px;}
.fav-empty-sub{font-size:12px;font-weight:600;color:var(--muted);line-height:1.65;}

.highlight{background:rgba(240,168,48,0.25);color:var(--amber);border-radius:2px;padding:0 1px;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;font-weight:600;}

/* Toast */
.copy-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#0c0f14;font-family:"Mulish",sans-serif;font-size:12px;font-weight:800;padding:9px 18px;border-radius:6px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:200;letter-spacing:0.02em;max-width:340px;text-align:center;line-height:1.4;}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Footer */
.footer{text-align:center;padding:24px 16px;display:flex;align-items:center;justify-content:center;gap:8px;border-top:1px solid var(--border);}
.footer-logo{width:18px;height:18px;background:var(--logo-gradient);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:var(--logo-text);flex-shrink:0;}
.footer-text{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.04em;}

/* Template tag */
.tag.t-template{background:rgba(156,163,180,0.07);color:var(--muted);border-color:rgba(156,163,180,0.18);}

@media(max-width:600px){
  .hdr{padding:12px 16px;}.hdr-badge{display:none;}.fav-toggle{font-size:8px;padding:4px 8px;letter-spacing:0.06em;}
  .search-wrap{padding:10px 16px;top:65px;}
  .filter-panel{top:109px;}
  .disc-bar{padding:8px 16px 4px;}.cat-bar{padding:4px 16px 8px;}
  .content{padding:16px 16px 60px;}
  .copy-hint{display:none;}
}
</style>
</head>

<div class="content" id="content"></div>

<div class="footer">

</div>

// State
let activeDisc="all", activeCat="all", searchTerm="", showFavs=false;

// Safe localStorage
function loadFavs(){
  try{return JSON.parse(localStorage.getItem('slr-favs')||'[]');}
  catch(e){return [];}
}
function saveFavs(){
  try{localStorage.setItem('slr-favs',JSON.stringify(favorites));}
  catch(e){}
}
let favorites=loadFavs();

function isFav(t){return favorites.includes(t);}
function toggleFav(t,e){
  e.stopPropagation();
  favorites=isFav(t)?favorites.filter(f=>f!==t):[...favorites,t];
  saveFavs();render();
}
function toggleFavView(){
  showFavs=!showFavs;
  document.getElementById('favToggle').classList.toggle('active',showFavs);
  render();
}

// Helpers
function isTemplate(p){return /\[.+?\]/.test(p);}
function getVisibleCats(){return DATA.categories.filter(c=>activeDisc==="all"||c.disc.includes(activeDisc));}
function getFilteredCats(){return getVisibleCats().filter(c=>activeCat==="all"||c.id===activeCat);}
function matchesSearch(t){return !searchTerm||t.toLowerCase().includes(searchTerm.toLowerCase());}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function hi(t){
  if(!searchTerm)return t;
  return t.replace(new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<span class="highlight">$1</span>');
}

// Cat bar
function buildCatBar(){
  const bar=document.getElementById('catBar');
  let html=`<button class="cat-btn${activeCat==='all'?' active':''}" data-cat="all">All</button>`;
  getVisibleCats().forEach(c=>{html+=`<button class="cat-btn${activeCat===c.id?' active':''}" data-cat="${c.id}">${c.name}</button>`;});
  bar.innerHTML=html;
  bar.querySelectorAll('.cat-btn').forEach(btn=>btn.addEventListener('click',()=>{activeCat=btn.dataset.cat;buildCatBar();render();}));
}

// Phrase card
function phraseCard(p,catName,subName,disc){
  const favd=isFav(p);
  const tmpl=isTemplate(p);
  const discTags=disc?disc.map(d=>`<span class="tag t-green">${d.toUpperCase()}</span>`).join(''):'';
  const catTag=catName?`<span class="tag">${catName}</span>`:'';
  const subTag=subName?`<span class="tag t-amber">${subName}</span>`:'';
  const tmplTag=tmpl?`<span class="tag t-template">Fill in blanks</span>`:'';
  return `<div class="phrase-card${favd?' favorited':''}" onclick="copyPhrase(this,'${esc(p)}')">
    <div class="phrase-top">
      <div class="phrase-text">${hi(p)}</div>
      <button class="fav-btn${favd?' active':''}" onclick="toggleFav('${esc(p)}',event)" aria-label="${favd?'Remove from favorites':'Save to favorites'}">${favd?'⭐':'☆'}</button>
    </div>
    <div class="phrase-bottom">
      <div class="phrase-tags">${discTags}${catTag}${subTag}${tmplTag}</div>
      <div class="copy-hint">tap to copy</div>
    </div>
  </div>`;
}

// Render
function render(){
  const container=document.getElementById('content');
  let html='',total=0,matched=0;

  if(showFavs){
    if(favorites.length===0){
      html=`<div class="fav-empty"><div class="fav-empty-icon" role="img" aria-label="Star">⭐</div><div class="fav-empty-title">No favorites yet</div><div class="fav-empty-sub">Tap the ☆ on any phrase card to save it here for quick access.</div></div>`;
    } else {
      const ff=favorites.filter(f=>matchesSearch(f));
      total=favorites.length; matched=ff.length;
      html=ff.length===0?'<div class="empty">No favorites match your search.</div>':`<div class="cat-section"><div class="cat-header">⭐ Favorites <span class="cat-count">${ff.length} saved</span></div>${ff.map(p=>phraseCard(p,'','',null)).join('')}</div>`;
    }
    container.innerHTML=html; updateCount(matched,total); return;
  }

  getFilteredCats().forEach(cat=>{
    let catHtml='',catCount=0;
    cat.subs.forEach(sub=>{
      let subHtml='',subCount=0;
      if(cat.id==="avoid"){
        sub.phrases.forEach(p=>{
          const c=p.bad+" "+p.why+" "+p.fix; total++;
          if(!matchesSearch(c))return;
          matched++;subCount++;
          subHtml+=`<div class="avoid-card"><div class="avoid-bad">${hi(p.bad)}</div><div class="avoid-why">${hi(p.why)}</div><div class="avoid-fix">${hi(p.fix)}</div></div>`;
        });
      } else {
        sub.phrases.forEach(p=>{
          total++;
          if(!matchesSearch(p))return;
          matched++;subCount++;
          subHtml+=phraseCard(p,cat.name,sub.name,cat.disc);
        });
      }
      if(subCount>0){catHtml+=`<div class="sub-header">${sub.name}</div>${subHtml}`;catCount+=subCount;}
    });
    if(catCount>0){html+=`<div class="cat-section"><div class="cat-header">${cat.name} <span class="cat-count">${catCount} phrase${catCount!==1?'s':''}</span></div>${catHtml}</div>`;}
  });

  container.innerHTML=html||'<div class="empty">No phrases match your search. Try a different keyword.</div>';
  updateCount(matched,total);
}

function updateCount(matched,total){
  document.getElementById('searchCount').textContent=searchTerm?`${matched} / ${total}`:`${total} phrases`;
}

// Copy with fallback for non-HTTPS / unsupported contexts
function copyPhrase(el,text){
  const doToast=()=>{
    el.classList.add('copied');
    const toast=document.getElementById('toast');
    toast.textContent='✓ '+(text.length>72?text.slice(0,72)+'…':text);
    toast.classList.add('show');
    setTimeout(()=>{toast.classList.remove('show');el.classList.remove('copied');},2200);
  };
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(doToast).catch(()=>{
      fallbackCopy(text);doToast();
    });
  } else {
    fallbackCopy(text);doToast();
  }
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
}

// Search
function clearSearch(){
  document.getElementById('searchInput').value='';
  searchTerm='';
  document.getElementById('searchClear').classList.remove('visible');
  render();
  document.getElementById('searchInput').focus();
}

document.addEventListener('DOMContentLoaded',()=>{
  // Search input
  document.getElementById('searchInput').addEventListener('input',e=>{
    searchTerm=e.target.value.trim();
    document.getElementById('searchClear').classList.toggle('visible',searchTerm.length>0);
    render();
  });
  document.getElementById('searchClear').addEventListener('click',clearSearch);

  // Favorites toggle
  document.getElementById('favToggle').addEventListener('click',toggleFavView);

  // Discipline filter
  document.getElementById('discBar').addEventListener('click',e=>{
    if(!e.target.classList.contains('disc-btn'))return;
    activeDisc=e.target.dataset.disc;
    document.querySelectorAll('.disc-btn').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    activeCat="all"; buildCatBar(); render();
  });

  // Focus search
  document.getElementById('searchInput').focus();

  buildCatBar();
  render();
});
</script>
</body>
</html>
